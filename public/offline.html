<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión - BarrioRed</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FEFCF9;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
      background: white;
      border: 4px solid black;
      padding: 40px;
      box-shadow: 8px 8px 0px 0px rgba(0, 0, 0, 1);
      text-align: center;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 2.5rem;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      font-style: italic;
      margin-bottom: 20px;
      color: #DC2626;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 30px;
      color: rgba(0, 0, 0, 0.7);
    }

    .icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 30px;
      border: 3px solid black;
      background: rgba(220, 38, 38, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    button {
      background: #DC2626;
      color: white;
      border: 2px solid black;
      padding: 14px 32px;
      font-size: 0.875rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
      transition: all 0.2s;
    }

    button:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px 0px rgba(0, 0, 0, 1);
    }

    button:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    .tips {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 2px solid rgba(0, 0, 0, 0.1);
      text-align: left;
    }

    .tips h2 {
      font-weight: 800;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 15px;
    }

    .tips ul {
      list-style: none;
      padding: 0;
    }

    .tips li {
      padding-left: 20px;
      position: relative;
      margin-bottom: 10px;
      font-size: 0.875rem;
      color: rgba(0, 0, 0, 0.6);
    }

    .tips li:before {
      content: "→";
      position: absolute;
      left: 0;
      font-weight: bold;
      color: #DC2626;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sin Conexión</h1>
    <p>
      No se pudo conectar a BarrioRed. Verifica tu conexión a internet e inténtalo de nuevo.
    </p>
    <button onclick="window.location.reload()">Reintentar</button>

    <div class="tips">
      <h2>Soluciones:</h2>
      <ul>
        <li>Activa tus datos móviles o Wi-Fi</li>
        <li>Verifica que el modo avión esté desactivado</li>
        <li>Reinicia tu router si estás en Wi-Fi</li>
        <li>Intenta moverte a una zona con mejor señal</li>
      </ul>
    </div>
  </div>

  <script>
    // Auto-retry when connection restored
    window.addEventListener('online', () => {
      console.log('Connection restored, reloading...')
      window.location.reload()
    })

    // Log offline state
    console.log('Offline page loaded. Connection status:', navigator.onLine ? 'online' : 'offline')
  </script>
</body>
</html>
